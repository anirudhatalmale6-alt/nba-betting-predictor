name: Daily NBA Betting Picks

on:
  schedule:
    # Run at 10:00 AM ET (14:00 UTC) every day during NBA season (Oct-June)
    - cron: '0 14 * 1-6,10-12 *'
  workflow_dispatch:

env:
  ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

jobs:
  generate-picks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily prediction pipeline
        run: python run_daily.py

      - name: Generate picks page
        run: python generate_picks_page.py

      - name: Commit and push picks
        run: |
          git config user.name "NBA Predictor Bot"
          git config user.email "bot@users.noreply.github.com"
          git add TODAYS_PICKS.md data/output/
          git diff --staged --quiet || git commit -m "NBA picks for $(date +%Y-%m-%d)"
          git push
